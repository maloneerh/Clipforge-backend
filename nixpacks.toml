# nixpacks.toml
# Tells Railway what system packages to install alongside Python.
# FFmpeg is the key one — it's what actually cuts the videos.

[phases.setup]
nixPkgs = ["ffmpeg", "python311"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
